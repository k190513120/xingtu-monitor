name = "xingtu-monitor"
main = "src/index.ts"
compatibility_date = "2024-09-23"

routes = [
  { pattern = "xingtu.xiaomiao.win", custom_domain = true, zone_id = "81498ac216563761c63636b270a4caf1" }
]

# 定时任务：全天每 30 分钟触发一次
# 新的一天（新加坡时间 00:00 后）首次触发开启全量处理，续跑直到完成
# 全量完成后当天后续 cron 静默跳过，无额外成本
[triggers]
crons = ["*/30 * * * *"]

# 静态资源：Vite 构建产物（dist/）
# not_found_handling = "none" 让未匹配到静态文件的请求（如 /api/*）交给 Worker 处理
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "none"

# KV 命名空间
[[kv_namespaces]]
binding = "TASK_STORE"
id = "ff2e1ec95ca34515bc2b7ec0c6374800"
preview_id = "170595846f3e4018b2b8f13f6997fb23"
